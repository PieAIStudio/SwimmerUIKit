name: quality-check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec lefthook install
      - run: pnpm typecheck
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test
      - run: pnpm build
      - run: pnpm build-storybook
      - run: pnpm docs:check
      - run: npx publint
      - run: npx @arethetypeswrong/cli --pack . --entrypoints . ./package.json --profile esm-only
      - run: git diff --check
